<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLOCK 6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{
  --paper:#EEEFE7;
  --paper-alt:#E3E5DA;
  --ink:#22241F;
  --ink-soft:#5B5E51;
  --ink-faint:#8C8F80;
  --block-fill:#2E3A32;
  --teal:#3B6E71;
  --teal-soft:#DCE7E6;
  --gold:#AD8A3F;
  --line:#C7CABC;
  --danger:#A24936;
  --danger-soft:#F1E1DB;
  --radius:2px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Serif',serif;}
body{display:flex;min-height:100vh;}
::selection{background:var(--teal);color:var(--paper);}

/* ---------- Sidebar ---------- */
.sidebar{
  width:216px;flex-shrink:0;border-right:1px solid var(--line);
  display:flex;flex-direction:column;padding:28px 20px;
  position:sticky;top:0;height:100vh;
}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.logo-bar{display:flex;flex-direction:column;gap:2px;width:10px;}
.logo-bar div{height:4px;background:var(--block-fill);}
.logo-bar div:nth-child(2){background:var(--teal);}
.logo-bar div:nth-child(4){background:var(--gold);}
.logo-text{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;letter-spacing:0.02em;}
.tagline{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--ink-faint);margin:0 0 34px 0;letter-spacing:0.02em;}
.nav{display:flex;flex-direction:column;gap:2px;}
.nav-item{
  font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:0.03em;
  padding:11px 10px;cursor:pointer;color:var(--ink-soft);border-left:2px solid transparent;
  display:flex;align-items:center;gap:8px;user-select:none;
}
.nav-item .num{color:var(--ink-faint);font-weight:600;}
.nav-item:hover{color:var(--ink);background:var(--paper-alt);}
.nav-item.active{color:var(--ink);border-left:2px solid var(--teal);background:var(--paper-alt);font-weight:600;}
.sidebar-foot{margin-top:auto;font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:var(--ink-faint);line-height:1.6;}
.sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:5px;}
.sync-dot.on{background:var(--teal);}
.sync-dot.off{background:var(--ink-faint);}

/* ---------- Main ---------- */
.main{flex:1;min-width:0;padding:36px 44px 80px;max-width:980px;}
.view-header{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:26px;border-bottom:1px solid var(--ink);padding-bottom:14px;}
.view-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:26px;}
.view-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);margin-top:4px;}
.date-nav{display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;}
.date-nav button{
  background:none;border:1px solid var(--line);color:var(--ink);width:26px;height:26px;
  cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:13px;border-radius:var(--radius);
}
.date-nav button:hover{background:var(--block-fill);color:var(--paper);border-color:var(--block-fill);}
.date-nav .range{min-width:150px;text-align:center;}
.date-nav input[type=date]{font-family:'IBM Plex Mono',monospace;border:1px solid var(--line);background:var(--paper);color:var(--ink);padding:4px 6px;border-radius:var(--radius);}

section.block{margin-bottom:36px;}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.08em;color:var(--teal);text-transform:uppercase;margin:0 0 10px 0;font-weight:600;}

/* ---------- Weekly grid ---------- */
.week-grid{width:100%;border-collapse:collapse;table-layout:fixed;}
.week-grid th{
  font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;color:var(--ink-soft);
  padding:6px 4px;border-bottom:1px solid var(--ink);text-align:center;
}
.week-grid th .d{display:block;font-size:9px;color:var(--ink-faint);font-weight:400;}
.week-grid td{border:1px solid var(--line);padding:0;vertical-align:top;}
.week-grid .blk-idx{
  width:26px;background:var(--block-fill);color:var(--paper);text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 0;
}
.week-grid textarea{
  width:100%;height:52px;border:none;background:transparent;resize:none;
  font-family:'IBM Plex Serif',serif;font-size:12.5px;color:var(--ink);padding:6px 6px;line-height:1.4;
}
.week-grid textarea:focus{outline:none;background:var(--teal-soft);}
.divider-row td{
  background:var(--paper-alt);text-align:center;font-family:'IBM Plex Mono',monospace;
  font-size:9.5px;color:var(--ink-faint);padding:2px;letter-spacing:0.1em;
}

/* ---------- Categories ---------- */
.cat-summary{font-family:'IBM Plex Mono',monospace;font-size:13px;margin-bottom:12px;color:var(--ink-soft);}
.cat-summary b{color:var(--ink);font-size:18px;font-family:'Space Grotesk',sans-serif;}
.cat-table{width:100%;border-collapse:collapse;}
.cat-table th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);text-align:left;padding:4px 8px;border-bottom:1px solid var(--line);font-weight:600;}
.cat-table td{padding:4px 8px;border-bottom:1px solid var(--line);}
.cat-table input[type=text]{width:100%;border:none;background:transparent;font-family:'IBM Plex Serif',serif;font-size:13px;padding:4px;color:var(--ink);}
.cat-table input[type=number]{width:52px;border:1px solid var(--line);background:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:4px;border-radius:var(--radius);color:var(--ink);}
.cat-table input:focus{outline:none;background:var(--teal-soft);}
.del-btn{background:none;border:none;color:var(--danger);cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:14px;}
.add-btn,.ghost-btn{
  font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:none;border:1px solid var(--ink);
  color:var(--ink);padding:7px 12px;cursor:pointer;border-radius:var(--radius);margin-top:10px;letter-spacing:0.02em;
}
.add-btn:hover,.ghost-btn:hover{background:var(--ink);color:var(--paper);}

/* ---------- Daily ---------- */
.day-block{display:grid;grid-template-columns:150px 1fr;border:1px solid var(--line);margin-bottom:-1px;}
.day-block .idx-col{
  background:var(--block-fill);color:var(--paper);padding:12px 12px;display:flex;flex-direction:column;gap:6px;
}
.day-block .idx-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#B9C4BC;}
.day-block .idx-col input{
  background:transparent;border:none;border-bottom:1px dashed #6C776D;color:var(--paper);
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;padding:2px 0;width:100%;
}
.day-block .idx-col input:focus{outline:none;border-bottom-color:var(--gold);}
.day-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.plan-row{display:flex;align-items:flex-start;gap:8px;}
.plan-row input[type=checkbox]{margin-top:4px;accent-color:var(--teal);}
.plan-row input[type=text]{flex:1;border:none;border-bottom:1px solid var(--line);background:transparent;font-family:'IBM Plex Serif',serif;font-size:13px;padding:3px 2px;color:var(--ink);}
.plan-row input[type=text]:focus{outline:none;border-bottom-color:var(--teal);}
.plan-row.done input[type=text]{color:var(--ink-faint);text-decoration:line-through;}
.plan-row .del-btn{font-size:12px;}
.mini-add{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--teal);background:none;border:none;cursor:pointer;padding:2px 0;text-align:left;}
.action-ta{width:100%;border:1px dashed var(--line);background:var(--paper-alt);font-family:'IBM Plex Serif',serif;font-style:italic;font-size:12.5px;padding:8px;resize:vertical;min-height:40px;color:var(--ink-soft);border-radius:var(--radius);}
.action-ta:focus{outline:none;border-color:var(--teal);}
.action-ta::placeholder{color:var(--ink-faint);}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
textarea.field,input.field{
  width:100%;border:1px solid var(--line);background:var(--paper);font-family:'IBM Plex Serif',serif;
  font-size:13px;padding:10px;color:var(--ink);border-radius:var(--radius);
}
textarea.field{resize:vertical;min-height:70px;}
textarea.field:focus,input.field:focus{outline:none;border-color:var(--teal);background:#fff;}
.diary-line{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.diary-line .n{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);width:14px;}
.diary-line input{flex:1;}
.gbn{display:grid;grid-template-columns:1fr;gap:10px;}
.gbn label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.08em;color:var(--ink-soft);display:block;margin-bottom:4px;}
.gbn .good{border-left:3px solid var(--teal);padding-left:10px;}
.gbn .bad{border-left:3px solid var(--danger);padding-left:10px;}
.gbn .next{border-left:3px solid var(--gold);padding-left:10px;}

/* ---------- Review ---------- */
.core-box{border:1px solid var(--ink);padding:16px;background:var(--paper-alt);}
.core-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.core-row select{font-family:'IBM Plex Mono',monospace;font-size:13px;padding:6px 8px;border:1px solid var(--line);border-radius:var(--radius);background:#fff;}
.core-frac{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;display:flex;align-items:center;gap:4px;}
.core-frac input{width:44px;text-align:center;border:1px solid var(--line);border-radius:var(--radius);font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;padding:4px;}
.factor-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.factor-grid div label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);display:block;margin-bottom:4px;}

table.gb-table{width:100%;border-collapse:collapse;}
table.gb-table th{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);border-bottom:1px solid var(--ink);padding:6px 4px;text-align:left;}
table.gb-table td{border-bottom:1px solid var(--line);padding:4px;vertical-align:top;}
table.gb-table td.day-lbl{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-soft);width:36px;padding-top:8px;}
table.gb-table input{width:100%;border:none;background:transparent;font-family:'IBM Plex Serif',serif;font-size:12.5px;padding:5px 4px;color:var(--ink);}
table.gb-table input:focus{outline:none;background:var(--teal-soft);}

/* ---------- Settings / Login ---------- */
.login-box{border:1px solid var(--ink);background:var(--paper-alt);padding:20px;max-width:420px;}
.login-box p{font-family:'IBM Plex Serif',serif;font-size:13px;color:var(--ink-soft);line-height:1.6;margin:0 0 16px 0;}
.g-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px;
  border:1px solid var(--line);border-radius:var(--radius);background:#fff;font-family:'IBM Plex Mono',monospace;
  font-size:12.5px;font-weight:600;color:var(--ink);cursor:pointer;
}
.g-btn:hover{background:var(--paper);}
.user-card{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.user-avatar{width:38px;height:38px;border-radius:50%;background:var(--block-fill);color:var(--paper);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-weight:700;}
.user-name{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;}
.user-email{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);}
.logout-btn{font-family:'IBM Plex Mono',monospace;font-size:11.5px;background:none;border:1px solid var(--line);color:var(--ink-soft);padding:7px 12px;cursor:pointer;border-radius:var(--radius);}
.logout-btn:hover{border-color:var(--danger);color:var(--danger);}
.meta-note{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);margin-top:18px;line-height:1.7;}
.meta-note code{background:var(--paper-alt);padding:1px 4px;border-radius:2px;}

.save-flag{position:fixed;bottom:16px;right:20px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-faint);opacity:0;transition:opacity .3s;}
.save-flag.show{opacity:1;}
.loading-note{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--ink-faint);padding:20px 0;}

@media (max-width:820px){
  body{flex-direction:column;}
  .sidebar{width:100%;height:auto;position:sticky;top:0;flex-direction:row;align-items:center;padding:14px 16px;z-index:10;background:var(--paper);border-right:none;border-bottom:1px solid var(--line);}
  .logo,.tagline,.sidebar-foot{display:none;}
  .nav{flex-direction:row;flex:1;justify-content:space-around;}
  .main{padding:22px 16px 60px;}
  .day-block{grid-template-columns:1fr;}
  .grid2{grid-template-columns:1fr;}
  .factor-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-bar"><div></div><div></div><div></div><div></div><div></div><div></div></div>
    <div class="logo-text">BLOCK 6</div>
  </div>
  <p class="tagline">하루 24시간이 아닌<br>6개의 블럭입니다</p>
  <div class="nav">
    <div class="nav-item" data-view="weekly" onclick="switchView('weekly')"><span class="num">01</span> Weekly Plan</div>
    <div class="nav-item" data-view="daily" onclick="switchView('daily')"><span class="num">02</span> Daily</div>
    <div class="nav-item" data-view="review" onclick="switchView('review')"><span class="num">03</span> Weekly Review</div>
    <div class="nav-item" data-view="settings" onclick="switchView('settings')"><span class="num">04</span> 설정</div>
  </div>
  <div class="sidebar-foot" id="sidebarFoot">PLAN → DO → CHECK<br><span class="sync-dot off"></span>로그인 필요</div>
</div>

<div class="main" id="main"></div>
<div class="save-flag" id="saveFlag">저장됨</div>

<script>
/* ============ Firebase (거인의 공부와 동일한 giant-note 프로젝트 재사용) ============ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB1nk2yq4QhLpd6mEeCUhmZnLfoQ52nVlI",
  authDomain: "giant-note.firebaseapp.com",
  projectId: "giant-note"
};
const GOOGLE_CLIENT_ID = "647503400558-acegpfk8j1nust43ges5gur57qassv8c.apps.googleusercontent.com";

let db, auth;
try {
  if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.firestore();
  auth = firebase.auth();
} catch(e) { console.error("Firebase 초기화 오류:", e); }

let currentUser = null;
let isLoggingIn = false;

/* ============ Constants / date helpers ============ */
const DOW_KO = ['월','화','수','목','금','토','일'];
const BLOCK_DEFAULT = ['','','','','',''];

function pad(n){return String(n).padStart(2,'0');}
function fmt(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function parseDate(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function getMonday(d){const day=d.getDay();const diff=(day===0?-6:1-day);const m=new Date(d);m.setDate(d.getDate()+diff);m.setHours(0,0,0,0);return m;}
function addDays(dateStr,n){const d=parseDate(dateStr);d.setDate(d.getDate()+n);return fmt(d);}
function weekDates(mondayStr){return Array.from({length:7},(_,i)=>addDays(mondayStr,i));}
function shortLabel(dateStr){const d=parseDate(dateStr);return (d.getMonth()+1)+'.'+d.getDate();}
function escAttr(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

let currentView = 'weekly';
let currentWeekStart = fmt(getMonday(new Date()));
let currentDate = fmt(new Date());

const dayCache = {};   // date -> dayObj
const weekCache = {};  // weekStart -> {categories, review}
const dayTimers = {};
let weekTimer = null;

function defaultDay(){
  return {
    blocks: [...BLOCK_DEFAULT],
    // Firestore는 배열 안에 배열(nested array)을 저장할 수 없어서
    // 블럭 인덱스를 키로 하는 객체(map)로 관리합니다: {0:[...], 1:[...], ...}
    plans: {0:[],1:[],2:[],3:[],4:[],5:[]},
    actions: ['','','','','',''],
    memo:'', diary:['','',''],
    good:'', bad:'', next:''
  };
}
function normalizeDay(d){
  // 예전 형식(plans가 배열) 이나 누락된 값이 오더라도 안전하게 보정
  if (!d) return defaultDay();
  const day = {...defaultDay(), ...d};
  if (Array.isArray(day.plans)){
    const obj = {};
    day.plans.forEach((arr,i)=>{ obj[i] = Array.isArray(arr) ? arr : []; });
    day.plans = obj;
  } else {
    const obj = {};
    for(let i=0;i<6;i++) obj[i] = Array.isArray(day.plans[i]) ? day.plans[i] : [];
    day.plans = obj;
  }
  return day;
}
function defaultWeekMeta(){
  return {
    categories: [
      {name:'모닝루틴', planned:0, actual:0},
      {name:'회사', planned:0, actual:0},
      {name:'운동', planned:0, actual:0},
      {name:'휴식', planned:0, actual:0},
      {name:'친구', planned:0, actual:0}
    ],
    review: { coreBlock:'', achieved:0, total:5,
      factors:{external:'',physical:'',psychological:'',other:''},
      keyword:'', insight:'', reward:'' }
  };
}

/* ============ Firestore read/write ============ */
async function fetchDay(date){
  if (!currentUser) return defaultDay();
  try{
    const doc = await db.collection('users').doc(currentUser.uid).collection('block6_days').doc(date).get();
    if (doc.exists) return normalizeDay(doc.data());
  }catch(e){ console.error('day load 실패', e); }
  return defaultDay();
}
async function fetchWeekMeta(ws){
  if (!currentUser) return defaultWeekMeta();
  try{
    const doc = await db.collection('users').doc(currentUser.uid).collection('block6_weeks').doc(ws).get();
    if (doc.exists){
      const data = doc.data();
      if(!data.review) data.review = defaultWeekMeta().review;
      return data;
    }
  }catch(e){ console.error('week load 실패', e); }
  return defaultWeekMeta();
}

async function loadDay(date){
  if (dayCache[date]) return dayCache[date];
  const d = await fetchDay(date);
  dayCache[date] = d;
  return d;
}
async function loadWeekMeta(ws){
  if (weekCache[ws]) return weekCache[ws];
  const w = await fetchWeekMeta(ws);
  weekCache[ws] = w;
  return w;
}
async function ensureWeekLoaded(ws){
  await loadWeekMeta(ws);
  await Promise.all(weekDates(ws).map(loadDay));
}

function flagSaved(text){
  const el = document.getElementById('saveFlag');
  el.classList.add('show');
  el.textContent = text || ('저장됨 · ' + new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 1600);
}

function queueSaveDay(date){
  clearTimeout(dayTimers[date]);
  dayTimers[date] = setTimeout(async ()=>{
    if (!currentUser){ flagSaved('로그인 필요 · 이 기기에만 임시 저장됨'); return; }
    try{
      await db.collection('users').doc(currentUser.uid).collection('block6_days').doc(date).set(dayCache[date]);
      flagSaved();
    }catch(e){ console.error('day 저장 실패', e); flagSaved('저장 실패'); }
  }, 500);
}
function queueSaveWeek(ws){
  clearTimeout(weekTimer);
  weekTimer = setTimeout(async ()=>{
    if (!currentUser){ flagSaved('로그인 필요 · 이 기기에만 임시 저장됨'); return; }
    try{
      await db.collection('users').doc(currentUser.uid).collection('block6_weeks').doc(ws).set(weekCache[ws]);
      flagSaved();
    }catch(e){ console.error('week 저장 실패', e); flagSaved('저장 실패'); }
  }, 500);
}

/* ============ Auth ============ */
function updateSidebarAuthStatus(){
  const el = document.getElementById('sidebarFoot');
  if (!el) return;
  if (currentUser){
    el.innerHTML = 'PLAN → DO → CHECK<br><span class="sync-dot on"></span>' + escAttr(currentUser.email||'동기화 됨');
  } else {
    el.innerHTML = 'PLAN → DO → CHECK<br><span class="sync-dot off"></span>로그인 필요';
  }
}

async function refreshAllForAuthChange(){
  // 캐시를 비우고 현재 보고 있는 데이터를 다시 불러옵니다.
  Object.keys(dayCache).forEach(k=>delete dayCache[k]);
  Object.keys(weekCache).forEach(k=>delete weekCache[k]);
  updateSidebarAuthStatus();
  await render();
}

if (auth){
  auth.onAuthStateChanged(async (cu)=>{
    currentUser = cu || null;
    isLoggingIn = false;
    await refreshAllForAuthChange();
  });
}

async function handleGoogleCredential(response){
  isLoggingIn = true;
  try{
    const credential = firebase.auth.GoogleAuthProvider.credential(response.credential);
    await auth.signInWithCredential(credential);
  }catch(e){
    isLoggingIn = false;
    console.error(e);
    alert('로그인 오류: ' + e.message);
    render();
  }
}

function initGoogleIdentity(){
  if (currentUser) return;
  const init = ()=>{
    if (!window.google || !window.google.accounts) return;
    window.google.accounts.id.initialize({ client_id: GOOGLE_CLIENT_ID, callback: handleGoogleCredential, auto_select:false, ux_mode:'popup' });
  };
  if (window.google && window.google.accounts) init();
  else {
    const s = document.querySelector('script[src="https://accounts.google.com/gsi/client"]');
    if (s) s.addEventListener('load', init);
    setTimeout(init, 1200);
  }
}
initGoogleIdentity();

function signInWithGoogle(){
  if (!window.google || !window.google.accounts){ alert('Google 로그인 준비 중입니다. 잠시 후 다시 시도해주세요.'); return; }
  isLoggingIn = true; render();
  window.google.accounts.id.prompt(n=>{
    if (n.isNotDisplayed() || n.isSkippedMoment()){
      const client = window.google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID, scope:'email profile',
        callback: async (tr)=>{
          if (tr.error){ isLoggingIn=false; render(); return; }
          try{
            const cred = firebase.auth.GoogleAuthProvider.credential(null, tr.access_token);
            await auth.signInWithCredential(cred);
          }catch(e){ isLoggingIn=false; alert('로그인 오류: '+e.message); render(); }
        }
      });
      client.requestAccessToken();
    }
  });
}
function signOut(){ auth.signOut(); }

/* ============ View switching ============ */
function switchView(v){ currentView = v; render(); }

async function shiftWeek(n){
  currentWeekStart = addDays(currentWeekStart, n*7);
  currentDate = weekDates(currentWeekStart)[0];
  await render();
}
async function shiftDay(n){
  const nd = addDays(currentDate, n);
  const ws = fmt(getMonday(parseDate(nd)));
  if (ws !== currentWeekStart) currentWeekStart = ws;
  currentDate = nd;
  await render();
}
async function jumpToDate(val){
  if (!val) return;
  const ws = fmt(getMonday(parseDate(val)));
  if (ws !== currentWeekStart) currentWeekStart = ws;
  currentDate = val;
  await render();
}

async function render(){
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.view === currentView);
  });
  const main = document.getElementById('main');

  if (currentView === 'settings'){ main.innerHTML = renderSettings(); return; }

  main.innerHTML = '<p class="loading-note">불러오는 중…</p>';

  if (currentView === 'weekly'){ await ensureWeekLoaded(currentWeekStart); main.innerHTML = renderWeekly(); }
  else if (currentView === 'daily'){ await loadDay(currentDate); main.innerHTML = renderDaily(); }
  else { await ensureWeekLoaded(currentWeekStart); main.innerHTML = renderReview(); }
}

/* ============ WEEKLY ============ */
function renderWeekly(){
  const dates = weekDates(currentWeekStart);
  const week = weekCache[currentWeekStart] || defaultWeekMeta();
  const dividers = [ {after:1, label:'LUNCH'}, {after:3, label:'DINNER'} ];
  let rows = '';
  for(let b=0;b<6;b++){
    rows += `<tr>
      <td class="blk-idx">${b+1}</td>
      ${dates.map(d=>`<td><textarea oninput="updateBlockLabel('${d}',${b},this.value)">${escAttr((dayCache[d]||defaultDay()).blocks[b])}</textarea></td>`).join('')}
    </tr>`;
    const div = dividers.find(x=>x.after===b);
    if(div) rows += `<tr class="divider-row"><td></td>${dates.map(()=>`<td>${div.label}</td>`).join('')}</tr>`;
  }

  const totalPlanned = week.categories.reduce((s,c)=>s+(+c.planned||0),0);
  let catRows = week.categories.map((c,i)=>`
    <tr>
      <td><input type="text" value="${escAttr(c.name)}" oninput="updateCategory(${i},'name',this.value)"></td>
      <td><input type="number" min="0" value="${c.planned}" oninput="updateCategory(${i},'planned',this.value)"></td>
      <td><input type="number" min="0" value="${c.actual}" oninput="updateCategory(${i},'actual',this.value)"></td>
      <td><button class="del-btn" onclick="removeCategory(${i})">✕</button></td>
    </tr>`).join('');

  return `
  <div class="view-header">
    <div>
      <div class="view-title">Weekly Plan</div>
      <div class="view-sub">일주일 42블럭을 계획합니다</div>
    </div>
    <div class="date-nav">
      <button onclick="shiftWeek(-1)">‹</button>
      <span class="range">${shortLabel(dates[0])} MON – ${shortLabel(dates[6])} SUN</span>
      <button onclick="shiftWeek(1)">›</button>
    </div>
  </div>

  <section class="block">
    <p class="section-label">Step 1 — Weekly 블럭 채우기</p>
    <table class="week-grid">
      <thead><tr><th></th>${dates.map((d,i)=>`<th>${DOW_KO[i]}<span class="d">${shortLabel(d)}</span></th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </section>

  <section class="block">
    <p class="section-label">Step 2 — 블럭을 비우고 선택하기 · 가용블럭</p>
    <div class="cat-summary">가용블럭 &nbsp;<b>${totalPlanned}</b> / 42</div>
    <table class="cat-table">
      <thead><tr><th>카테고리</th><th>계획</th><th>실천</th><th></th></tr></thead>
      <tbody>${catRows}</tbody>
    </table>
    <button class="add-btn" onclick="addCategory()">+ 카테고리 추가</button>
  </section>
  `;
}

function updateBlockLabel(date, idx, val){
  const day = {...(dayCache[date]||defaultDay())};
  day.blocks = [...day.blocks]; day.blocks[idx] = val;
  dayCache[date] = day;
  queueSaveDay(date);
}
function updateCategory(i, field, val){
  const week = {...(weekCache[currentWeekStart]||defaultWeekMeta())};
  week.categories = week.categories.map((c,idx)=> idx===i ? {...c, [field]: field==='name' ? val : (parseInt(val)||0)} : c);
  weekCache[currentWeekStart] = week;
  queueSaveWeek(currentWeekStart);
  const summary = document.querySelector('.cat-summary b');
  if (summary && field !== 'name') summary.textContent = week.categories.reduce((s,c)=>s+(+c.planned||0),0);
}
function addCategory(){
  const week = {...(weekCache[currentWeekStart]||defaultWeekMeta())};
  week.categories = [...week.categories, {name:'새 카테고리', planned:0, actual:0}];
  weekCache[currentWeekStart] = week;
  queueSaveWeek(currentWeekStart);
  render();
}
function removeCategory(i){
  const week = {...(weekCache[currentWeekStart]||defaultWeekMeta())};
  week.categories = week.categories.filter((_,idx)=>idx!==i);
  weekCache[currentWeekStart] = week;
  queueSaveWeek(currentWeekStart);
  render();
}

/* ============ DAILY ============ */
function renderDaily(){
  const d = parseDate(currentDate);
  const dow = DOW_KO[(d.getDay()+6)%7];
  const day = dayCache[currentDate] || defaultDay();

  const blocksHtml = day.blocks.map((label,i)=>{
    const planRows = day.plans[i].map((p,pi)=>`
      <div class="plan-row ${p.done?'done':''}">
        <input type="checkbox" ${p.done?'checked':''} onchange="togglePlan(${i},${pi})">
        <input type="text" value="${escAttr(p.text)}" oninput="updatePlanText(${i},${pi},this.value)">
        <button class="del-btn" onclick="removePlan(${i},${pi})">✕</button>
      </div>`).join('');
    return `
    <div class="day-block">
      <div class="idx-col">
        <span class="idx-num">BLOCK ${i+1}</span>
        <input type="text" placeholder="블럭 이름" value="${escAttr(label)}" oninput="updateBlockLabel('${currentDate}',${i},this.value)">
      </div>
      <div class="day-body">
        ${planRows}
        <button class="mini-add" onclick="addPlan(${i})">+ 할 일 추가</button>
        <textarea class="action-ta" placeholder="이 블럭에 대한 평가 · 메모" oninput="updateAction(${i},this.value)">${escAttr(day.actions[i])}</textarea>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="view-header">
    <div>
      <div class="view-title">Daily</div>
      <div class="view-sub">계획을 세웠다면 이젠 실천해야 할 때</div>
    </div>
    <div class="date-nav">
      <button onclick="shiftDay(-1)">‹</button>
      <span class="range">${dow} · ${currentDate}</span>
      <input type="date" value="${currentDate}" onchange="jumpToDate(this.value)">
      <button onclick="shiftDay(1)">›</button>
    </div>
  </div>

  <section class="block">
    <p class="section-label">Block 6 — Plan / Action</p>
    ${blocksHtml}
  </section>

  <section class="block">
    <p class="section-label">Memo</p>
    <textarea class="field" placeholder="자유 메모 · 기억해야 할 사항, 감명 깊은 글귀 등" oninput="updateDayField('memo',this.value)">${escAttr(day.memo)}</textarea>
  </section>

  <section class="block">
    <p class="section-label">세 줄 일기</p>
    ${[0,1,2].map(i=>`
      <div class="diary-line">
        <span class="n">${i+1}</span>
        <input type="text" class="field" placeholder="오늘 느낀 감정을 솔직하게" value="${escAttr(day.diary[i])}" oninput="updateDiary(${i},this.value)">
      </div>`).join('')}
  </section>

  <section class="block gbn">
    <div class="good">
      <label>GOOD — 좋았던 일, 감사한 일</label>
      <textarea class="field" oninput="updateDayField('good',this.value)">${escAttr(day.good)}</textarea>
    </div>
    <div class="bad">
      <label>BAD — 힘들었던 일, 오늘로 끝낼 것</label>
      <textarea class="field" oninput="updateDayField('bad',this.value)">${escAttr(day.bad)}</textarea>
    </div>
    <div class="next">
      <label>NEXT — 내일 가장 중요한 단 하나</label>
      <input type="text" class="field" value="${escAttr(day.next)}" oninput="updateDayField('next',this.value)">
    </div>
  </section>
  `;
}

function addPlan(blockIdx){
  const day = normalizeDay(dayCache[currentDate]);
  day.plans = {...day.plans};
  day.plans[blockIdx] = [...day.plans[blockIdx], {id:Date.now(), text:'', done:false}];
  dayCache[currentDate] = day;
  queueSaveDay(currentDate);
  render();
}
function removePlan(blockIdx, planIdx){
  const day = normalizeDay(dayCache[currentDate]);
  day.plans = {...day.plans};
  day.plans[blockIdx] = day.plans[blockIdx].filter((_,pi)=>pi!==planIdx);
  dayCache[currentDate] = day;
  queueSaveDay(currentDate);
  render();
}
function togglePlan(blockIdx, planIdx){
  const day = normalizeDay(dayCache[currentDate]);
  day.plans = {...day.plans};
  day.plans[blockIdx] = day.plans[blockIdx].map((p,pi)=> pi===planIdx ? {...p, done: !p.done} : p);
  dayCache[currentDate] = day;
  queueSaveDay(currentDate);
  render();
}
function updatePlanText(blockIdx, planIdx, val){
  const day = normalizeDay(dayCache[currentDate]);
  day.plans = {...day.plans};
  day.plans[blockIdx] = day.plans[blockIdx].map((p,pi)=> pi===planIdx ? {...p, text: val} : p);
  dayCache[currentDate] = day;
  queueSaveDay(currentDate);
}
function updateAction(blockIdx, val){
  const day = {...(dayCache[currentDate]||defaultDay())};
  day.actions = [...day.actions]; day.actions[blockIdx] = val;
  dayCache[currentDate] = day;
  queueSaveDay(currentDate);
}
function updateDayField(field, val){
  const day = {...(dayCache[currentDate]||defaultDay())};
  day[field] = val;
  dayCache[currentDate] = day;
  queueSaveDay(currentDate);
}
function updateDiary(i, val){
  const day = {...(dayCache[currentDate]||defaultDay())};
  day.diary = [...day.diary]; day.diary[i] = val;
  dayCache[currentDate] = day;
  queueSaveDay(currentDate);
}

/* ============ REVIEW ============ */
function renderReview(){
  const dates = weekDates(currentWeekStart);
  const week = weekCache[currentWeekStart] || defaultWeekMeta();
  const r = week.review;
  const catOptions = week.categories.map(c=>`<option value="${escAttr(c.name)}" ${r.coreBlock===c.name?'selected':''}>${escAttr(c.name)}</option>`).join('');
  const totalPlanned = week.categories.reduce((s,c)=>s+(+c.planned||0),0);

  const catRows = week.categories.map((c,i)=>`
    <tr>
      <td>${escAttr(c.name)}</td>
      <td><input type="number" min="0" value="${c.planned}" oninput="updateCategory(${i},'planned',this.value)"></td>
      <td><input type="number" min="0" value="${c.actual}" oninput="updateCategory(${i},'actual',this.value)"></td>
    </tr>`).join('');

  const gbRows = dates.map((d,i)=>{
    const day = dayCache[d] || defaultDay();
    return `
    <tr>
      <td class="day-lbl">${DOW_KO[i]}</td>
      <td><input type="text" placeholder="good" value="${escAttr(day.good)}" oninput="updateDayFieldFor('${d}','good',this.value)"></td>
      <td><input type="text" placeholder="bad" value="${escAttr(day.bad)}" oninput="updateDayFieldFor('${d}','bad',this.value)"></td>
    </tr>`;
  }).join('');

  return `
  <div class="view-header">
    <div>
      <div class="view-title">Weekly One Page Review</div>
      <div class="view-sub">실천만큼 중요한 것은 점검입니다</div>
    </div>
    <div class="date-nav">
      <button onclick="shiftWeek(-1)">‹</button>
      <span class="range">${shortLabel(dates[0])} – ${shortLabel(dates[6])}</span>
      <button onclick="shiftWeek(1)">›</button>
    </div>
  </div>

  <section class="block">
    <p class="section-label">가용블럭 실행 정도</p>
    <div class="cat-summary">가용블럭 &nbsp;<b>${totalPlanned}</b> / 42</div>
    <table class="cat-table"><thead><tr><th>카테고리</th><th>계획</th><th>실천</th></tr></thead><tbody>${catRows}</tbody></table>
  </section>

  <section class="block">
    <p class="section-label">Core Block 달성도</p>
    <div class="core-box">
      <div class="core-row">
        <select onchange="updateReview('coreBlock',this.value)">
          <option value="">— 선택 —</option>
          ${catOptions}
        </select>
        <div class="core-frac">
          <input type="number" min="0" value="${r.achieved}" oninput="updateReview('achieved',this.value)"> /
          <input type="number" min="0" value="${r.total}" oninput="updateReview('total',this.value)">
        </div>
      </div>
      <div class="factor-grid">
        <div><label>외부 요인</label><textarea class="field" oninput="updateFactor('external',this.value)">${escAttr(r.factors.external)}</textarea></div>
        <div><label>신체적 요인</label><textarea class="field" oninput="updateFactor('physical',this.value)">${escAttr(r.factors.physical)}</textarea></div>
        <div><label>심리적 요인</label><textarea class="field" oninput="updateFactor('psychological',this.value)">${escAttr(r.factors.psychological)}</textarea></div>
        <div><label>기타 요인</label><textarea class="field" oninput="updateFactor('other',this.value)">${escAttr(r.factors.other)}</textarea></div>
      </div>
    </div>
  </section>

  <section class="block">
    <p class="section-label">일주일간 느낀 나의 감정</p>
    <table class="gb-table">
      <thead><tr><th></th><th>GOOD</th><th>BAD</th></tr></thead>
      <tbody>${gbRows}</tbody>
    </table>
    <div style="margin-top:10px;">
      <label style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);display:block;margin-bottom:4px;">이번 주 키워드</label>
      <input type="text" class="field" value="${escAttr(r.keyword)}" oninput="updateReview('keyword',this.value)" placeholder="# 키워드">
    </div>
  </section>

  <section class="block grid2">
    <div>
      <p class="section-label">알게 된 점 &amp; 다음 주 반영할 점</p>
      <textarea class="field" style="min-height:100px;" oninput="updateReview('insight',this.value)">${escAttr(r.insight)}</textarea>
    </div>
    <div>
      <p class="section-label">수고한 나에게 줄 선물</p>
      <textarea class="field" style="min-height:100px;" oninput="updateReview('reward',this.value)">${escAttr(r.reward)}</textarea>
    </div>
  </section>
  `;
}

function updateReview(field, val){
  const week = {...(weekCache[currentWeekStart]||defaultWeekMeta())};
  week.review = {...week.review, [field]: (field==='achieved'||field==='total') ? (parseInt(val)||0) : val};
  weekCache[currentWeekStart] = week;
  queueSaveWeek(currentWeekStart);
}
function updateFactor(field, val){
  const week = {...(weekCache[currentWeekStart]||defaultWeekMeta())};
  week.review = {...week.review, factors:{...week.review.factors, [field]: val}};
  weekCache[currentWeekStart] = week;
  queueSaveWeek(currentWeekStart);
}
function updateDayFieldFor(date, field, val){
  const day = {...(dayCache[date]||defaultDay())};
  day[field] = val;
  dayCache[date] = day;
  queueSaveDay(date);
}

/* ============ SETTINGS ============ */
function renderSettings(){
  if (currentUser){
    const initial = (currentUser.displayName||currentUser.email||'?').slice(0,1).toUpperCase();
    return `
    <div class="view-header">
      <div><div class="view-title">설정</div><div class="view-sub">계정 · 동기화</div></div>
    </div>
    <div class="login-box">
      <div class="user-card">
        <div class="user-avatar">${initial}</div>
        <div>
          <div class="user-name">${escAttr(currentUser.displayName||'사용자')}</div>
          <div class="user-email">${escAttr(currentUser.email||'')}</div>
        </div>
      </div>
      <p>✅ 거인의 공부와 같은 Google 계정으로 로그인되어 있습니다. 이 기기에서 작성한 내용은 다른 기기에서도 그대로 열립니다.</p>
      <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
    <p class="meta-note">
      Firestore 컬렉션: <code>users/{uid}/block6_days</code>, <code>users/{uid}/block6_weeks</code><br>
      거인의 공부의 tptRecords / pdrfRecords 등과는 완전히 분리되어 있습니다.
    </p>`;
  }
  return `
  <div class="view-header">
    <div><div class="view-title">설정</div><div class="view-sub">계정 · 동기화</div></div>
  </div>
  <div class="login-box">
    <p>Google 계정으로 로그인하면 이 기기에서 작성한 Weekly / Daily / Review 기록이 클라우드에 저장되고, 다른 기기에서도 같은 내용을 볼 수 있습니다. 로그인하지 않으면 이 브라우저 탭에서만 임시로 유지됩니다.</p>
    ${isLoggingIn ? '<div class="loading-note">로그인 처리 중…</div>' : `
    <button class="g-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Google 계정으로 로그인
    </button>`}
  </div>
  <p class="meta-note">로그인 없이도 Weekly / Daily / Review는 계속 사용할 수 있지만, 새로고침하면 내용이 사라집니다.</p>
  `;
}

render();
</script>
</body>
</html>
